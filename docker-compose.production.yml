# docker-compose.production.yml

volumes:
  pg_data_production:
  static_volume:

services:
  db:
    image: postgres:13.10
    env_file: .env
    volumes:
      - pg_data_production:/var/lib/postgresql/data
    networks:
      - taski_taski_network
    restart: always
  backend:
    depends_on:
      - db
    image: korsarr/taski_backend
    env_file: .env
    volumes:
      - static_volume:/backend_static
    networks:
      - taski_taski_network
    restart: always
  frontend:
    depends_on:
      - backend
    image: korsarr/taski_frontend
    env_file: .env
    command: cp -r /app/build/. /frontend_static/
    volumes:
      - static_volume:/frontend_static
    networks:
      - taski_taski_network
  nginx:
    depends_on:
      - backend
    image: korsarr/taski_gateway
    env_file: .env
    volumes:
      - static_volume:/staticfiles/
    ports:
      - 8000:80
    networks:
      - taski_taski_network
    restart: always

networks:
  taski_taski_network:
    driver: bridge